name: Update Ruby 3.2 version

on:
  schedule:
    - cron: '23 3 * * *'  # daily at 03:23 UTC
  workflow_dispatch:

concurrency: update-ruby-3-2

jobs:
  update-ruby:
    name: Update pinned Ruby 3.2.x version
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Checkout PR Branch
        uses: paketo-buildpacks/github-config/actions/pull-request/checkout-branch@main
        with:
          branch: automation/ruby-3-2-update/update-main

      - name: Determine latest Ruby 3.2.x
        id: latest
        shell: bash
        run: |
          set -euo pipefail

          latest=$(curl -fsSL https://cache.ruby-lang.org/pub/ruby/3.2/ \
            | grep -oE 'ruby-3\.2\.[0-9]+\.tar\.xz' \
            | sed -E 's/^ruby-|\.tar\.xz$//g' \
            | sort -V \
            | tail -1)

          if [[ -z "${latest}" ]]; then
            echo "Could not determine latest Ruby 3.2.x" >&2
            exit 1
          fi

          echo "version=${latest}" >> "$GITHUB_OUTPUT"
          echo "Latest Ruby 3.2.x: ${latest}"

      - name: Update pinned version in Dockerfiles
        shell: bash
        run: |
          set -euo pipefail

          files=(
            dependency/actions/compile/jammy.Dockerfile
            dependency/actions/compile/noble.Dockerfile
            dependency/test/jammy.Dockerfile
          )

          for file in "${files[@]}"; do
            sed -Ei "s/^ARG RUBY_VERSION=.*/ARG RUBY_VERSION=${{ steps.latest.outputs.version }}/" "${file}"
          done

      - name: Commit
        id: commit
        uses: paketo-buildpacks/github-config/actions/pull-request/create-commit@main
        with:
          message: "Updates Ruby 3.2 to ${{ steps.latest.outputs.version }}"
          pathspec: "."
          keyid: ${{ secrets.PAKETO_BOT_GPG_SIGNING_KEY_ID }}
          key: ${{ secrets.PAKETO_BOT_GPG_SIGNING_KEY }}

      - name: Push Branch
        if: ${{ steps.commit.outputs.commit_sha != '' }}
        uses: paketo-buildpacks/github-config/actions/pull-request/push-branch@main
        with:
          branch: automation/ruby-3-2-update/update-main

      - name: Open Pull Request
        if: ${{ steps.commit.outputs.commit_sha != '' }}
        uses: paketo-buildpacks/github-config/actions/pull-request/open@main
        with:
          token: ${{ secrets.PAKETO_BOT_GITHUB_TOKEN }}
          title: "Updates Ruby 3.2 to ${{ steps.latest.outputs.version }}"
          branch: automation/ruby-3-2-update/update-main

  failure:
    name: Alert on Failure
    runs-on: ubuntu-24.04
    needs: [update-ruby]
    if: ${{ always() && needs.update-ruby.result == 'failure' }}
    steps:
      - name: File Failure Alert Issue
        uses: paketo-buildpacks/github-config/actions/issue/file@main
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          repo: ${{ github.repository }}
          label: "failure:update-ruby-3-2-version"
          comment_if_exists: true
          issue_title: "Failure: Update Ruby 3.2 version workflow"
          issue_body: |
            Update Ruby 3.2 version workflow [failed](https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}).
          comment_body: |
            Another failure occurred: https://github.com/${{github.repository}}/actions/runs/${{github.run_id}}
